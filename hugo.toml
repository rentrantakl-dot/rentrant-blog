# RentRant Blog Site Configuration
# This is the main site configuration - copy to your site root

baseURL = "https://rentrant.nz/blog/"
languageCode = "en-nz"
title = "RentRant Blog"
theme = "rentrant-blog"

# Enable emoji
enableEmoji = true

# Canonify root-relative URLs (e.g. /posts/...) to absolute URLs using baseURL.
# Required because the Cloudflare Worker only routes /blog/* — root-relative links
# would otherwise bypass the worker and hit the main app, causing 404s.
canonifyURLs = true

[params]
  tagline = "The truth about that flat you're eyeing."
  description = "Insights, tips, and updates for NZ renters."
  author = "RentRant Team"
  mainAppUrl = "https://rentrant.nz"

  [params.analytics.umami]
    websiteId = "dbc2efd8-55c9-43f5-b94e-4ccc1a8e7df5"
    src = "https://analytics.rentrant.nz/script.js"

[[menus.main]]
  name = "Articles"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "How It Works"
  url = "https://rentrant.nz/how-it-works"
  weight = 2

